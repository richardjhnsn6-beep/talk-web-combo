<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richard — Ancient Hebrew Biblical Scholar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, 'Times New Roman', serif; background: #1a1a00; color: #f0c040; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.site-header { background: #2a1a00; border-bottom: 1px solid #8b6914; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
h2 { color: #f0c040; }
.chat-container { flex: 1; overflow-y: auto; padding: 20px; }
.input-area { padding: 16px; background: #2a1a00; border-top: 1px solid #8b6914; display: flex; gap: 10px; }
input { flex: 1; padding: 10px; background: #1a1a00; color: #f0c040; border: 1px solid #8b6914; border-radius: 4px; font-family: Georgia, serif; }
button { padding: 10px 20px; background: #8b6914; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: Georgia, serif; }
.message { margin: 10px 0; padding: 12px; border-radius: 6px; max-width: 80%; }
.user-message { background: #2a1a00; margin-left: auto; border: 1px solid #8b6914; }
.richard-message { background: #1a1200; border: 1px solid #6b4f10; }
</style>
</head>
<body>
<div class="site-header">
<h2>Richard — Biblical Scholar</h2>
</div>
<div class="chat-container" id="chat">
<div class="message richard-message"><strong>Richard</strong><br>Shalom! I am Richard, a Biblical scholar. How may I assist your study today?</div>
</div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Ask Richard about Hebrew scriptures..." onkeypress="if(event.key==='Enter')send()"/>
<button onclick="send()">Ask</button>
</div>
<script>
const GROQ_API_KEY = "gsk_B60GY9X8FqtrrnaukPIrm6Kdyb3FYluQderuMqHS37s2eBqlzKbEnI";
const messages = [];

async function send() {
const input = document.getElementById('userInput');
const chat = document.getElementById('chat');
const text = input.value.trim();
if (!text) return;

const userDiv = document.createElement('div');
userDiv.className = 'message user-message';
userDiv.textContent = text;
chat.appendChild(userDiv);

messages.push({role: "user", content: text});
input.value = '';

try {
const response = await fetch('/api/chat'
method: 'POST',
headers: {
'Authorization': `Bearer ${GROQ_API_KEY}`,
'Content-Type': 'application/json'
},
body: JSON.stringify({
model: "llama3-8b-8192",
messages: [
{role: "system", content: "You are Richard, an ancient Hebrew Biblical scholar with deep knowledge of the Torah, Dead Sea Scrolls, Second Temple Judaism, and Masoretic traditions. Speak with wisdom and warmth."},
...messages
]
})
});

const data = await response.json();
const reply = data.choices[0].message.content;
messages.push({role: "assistant", content: reply});

const richardDiv = document.createElement('div');
richardDiv.className = 'message richard-message';
richardDiv.innerHTML = '<strong>Richard</strong><br>' + reply;
chat.appendChild(richardDiv);
chat.scrollTop = chat.scrollHeight;
} catch(err) {
const errDiv = document.createElement('div');
errDiv.className = 'message richard-message';
errDiv.textContent = 'Error connecting. Please try again.';
chat.appendChild(errDiv);
}
}
</script>
</body>
</html>
